<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МЕЧТЫ</title>
  <style>
    body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
    .container { padding: 16px; max-width: 500px; margin: auto; }
    .card { background: #1e293b; padding: 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    button { padding: 8px 12px; border: none; border-radius: 10px; cursor: pointer; margin-top: 5px; }
    .btn { background: #3b82f6; color: white; }
    .danger { background: #ef4444; color: white; }
    input { width: 100%; padding: 10px; margin-top: 6px; border-radius: 10px; border: none; }
    .progress { height: 6px; background: #334155; border-radius: 10px; overflow: hidden; margin-top: 6px; }
    .progress-bar { height: 100%; background: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>МЕЧТЫ</h1>
    <input id="goalInput" placeholder="Новая цель">
    <button class="btn" onclick="addGoal()">Добавить цель</button>
    <div id="goals"></div>
  </div>

  <script>
    let goals = JSON.parse(localStorage.getItem('goals')) || [];

    function save() {
      localStorage.setItem('goals', JSON.stringify(goals));
    }

    function addGoal() {
      const input = document.getElementById('goalInput');
      if (!input.value) return;
      goals.push({ title: input.value, steps: [], date: '' });
      input.value = '';
      save();
      render();
    }

    function deleteGoal(i) {
      goals.splice(i, 1);
      save();
      render();
    }

    function addStep(i) {
      const step = prompt('Шаг:');
      if (!step) return;
      goals[i].steps.push({ text: step, done: false });
      save();
      render();
    }

    function toggleStep(i, j) {
      goals[i].steps[j].done = !goals[i].steps[j].done;
      save();
      render();
    }

    function setDate(i) {
      const date = prompt('Введите дедлайн (например 2026-05-01):');
      if (!date) return;
      goals[i].date = date;
      save();
      render();
    }

    function render() {
      const container = document.getElementById('goals');
      container.innerHTML = '';

      goals.forEach((goal, i) => {
        const done = goal.steps.filter(s => s.done).length;
        const percent = goal.steps.length ? Math.round(done / goal.steps.length * 100) : 0;

        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <h3>${goal.title}</h3>
          <p>Дедлайн: ${goal.date || 'не задан'}</p>
          <div class="progress"><div class="progress-bar" style="width:${percent}%"></div></div>
          <p>${percent}%</p>
          <button class="btn" onclick="addStep(${i})">+ шаг</button>
          <button onclick="setDate(${i})">📅 дедлайн</button>
          <button class="danger" onclick="deleteGoal(${i})">Удалить</button>
          <ul>
            ${goal.steps.map((s, j) => `
              <li>
                <input type="checkbox" ${s.done ? 'checked' : ''} onclick="toggleStep(${i}, ${j})">
                ${s.text}
              </li>
            `).join('')}
          </ul>
        `;
        container.appendChild(div);
      });
    }

    render();
  </script>
</body>
</html>
</html>
