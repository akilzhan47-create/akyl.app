<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REDMIND</title>

  <!-- Шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Arial;
      color: #111;
    }

    .container {
      padding: 16px;
      padding-bottom: 80px;
      max-width: 520px;
      margin: auto;
    }

    /* HEADER */
    .header {
      text-align: center;
      position: relative;
      margin-bottom: 10px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      color: #7f1d1d;
    }

    .by {
      position: absolute;
      right: 0;
      top: 10px;
      font-size: 12px;
      color: #555;
    }

    /* CARDS */
    .card {
      background: #f9fafb;
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid #eee;
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

    .primary {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .danger {
      background: black;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .ghost {
      background: #e5e7eb;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .progress {
      height: 6px;
      background: #e5e7eb;
      border-radius: 10px;
    }

    .bar {
      height: 100%;
      background: #1e3a8a;
    }

    .hidden { display: none; }

    /* NAVBAR */
    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 520px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: space-around;
      background: #fff;
      border-top: 1px solid #eee;
      padding: 10px 0;
    }

    .nav div {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">REDMIND</div>
    <div class="by">by Akylzhan</div>
  </div>

  <!-- ГЛАВНАЯ -->
  <div id="home">
    <input id="goalInput" placeholder="Новая цель">
    <button class="primary" onclick="addGoal()">Добавить цель</button>
    <div id="goals"></div>
  </div>

  <!-- ПРОГРЕСС -->
  <div id="progress" class="hidden">
    <h3>Прогресс</h3>
    <p>Здесь будет аналитика:</p>
    <ul>
      <li>За неделю</li>
      <li>За месяц</li>
      <li>За год</li>
    </ul>
  </div>

  <!-- АККАУНТ -->
  <div id="account" class="hidden">
    <h3>Аккаунт</h3>
    <input placeholder="Имя">
    <input placeholder="Род деятельности">
    <input placeholder="Семейное положение">
  </div>

</div>

<!-- НАВИГАЦИЯ -->
<div class="nav">
  <div onclick="show('home')">⚡<br>Главная</div>
  <div onclick="show('progress')">🚀<br>Прогресс</div>
  <div onclick="show('account')">👤<br>Аккаунт</div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem('goals')) || [];

function save() {
  localStorage.setItem('goals', JSON.stringify(goals));
}

function show(screen) {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('progress').classList.add('hidden');
  document.getElementById('account').classList.add('hidden');

  document.getElementById(screen).classList.remove('hidden');
}

function addGoal() {
  const input = document.getElementById('goalInput');
  if (!input.value) return;

  goals.push({ title: input.value, steps: [], open: false });
  input.value = '';
  save();
  render();
}

function toggleOpen(i) {
  goals[i].open = !goals[i].open;
  save();
  render();
}

function addStep(i) {
  const step = prompt('Шаг:');
  if (!step) return;

  goals[i].steps.push({ text: step, done: false });
  save();
  render();
}

function toggleStep(i, j) {
  goals[i].steps[j].done = !goals[i].steps[j].done;
  save();
  render();
}

function deleteGoal(i) {
  goals.splice(i, 1);
  save();
  render();
}

function render() {
  const container = document.getElementById('goals');
  container.innerHTML = '';

  goals.forEach((g, i) => {
    const done = g.steps.filter(s => s.done).length;
    const pct = g.steps.length ? Math.round(done / g.steps.length * 100) : 0;

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="row">
        <b>${g.title}</b>
        <button class="ghost" onclick="toggleOpen(${i})">
          ${g.open ? 'Скрыть' : 'Открыть'}
        </button>
      </div>

      <div class="${g.open ? '' : 'hidden'}">
        <div class="progress">
          <div class="bar" style="width:${pct}%"></div>
        </div>

        <p>${pct}%</p>

        <button class="primary" onclick="addStep(${i})">+ шаг</button>
        <button class="danger" onclick="deleteGoal(${i})">Удалить</button>

        <ul>
          ${g.steps.map((s, j) => `
            <li>
              <input type="checkbox"
                ${s.done ? 'checked' : ''}
                onclick="toggleStep(${i}, ${j})">
              ${s.text}
            </li>
          `).join('')}
        </ul>
      </div>
    `;

    container.appendChild(div);
  });
}

render();
</script>

</body>
</html>
