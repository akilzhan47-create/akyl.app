<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REDMIND</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #ffffff;
      color: #111;
    }

    .container {
      padding: 16px;
      max-width: 520px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #7f1d1d; /* бордовый */
      margin-bottom: 12px;
    }

    .card {
      background: #f9fafb;
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid #eee;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-weight: 600;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 5px;
    }

    .primary {
      background: #1e3a8a; /* тёмно-синий */
      color: white;
    }

    .danger {
      background: black;
      color: white;
    }

    .ghost {
      background: #e5e7eb;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 10px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .progress {
      height: 6px;
      background: #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 6px;
    }

    .bar {
      height: 100%;
      background: #1e3a8a;
    }

    .hidden {
      display: none;
    }

    ul {
      padding-left: 18px;
    }

    li {
      margin: 6px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>REDMIND</h1>

    <input id="goalInput" placeholder="Новая цель">
    <button class="primary" onclick="addGoal()">Добавить цель</button>

    <div id="goals"></div>
  </div>

  <script>
    let goals = JSON.parse(localStorage.getItem('goals')) || [];

    function save() {
      localStorage.setItem('goals', JSON.stringify(goals));
    }

    function addGoal() {
      const input = document.getElementById('goalInput');
      if (!input.value) return;

      goals.push({
        title: input.value,
        steps: [],
        date: '',
        open: false
      });

      input.value = '';
      save();
      render();
    }

    function deleteGoal(i) {
      goals.splice(i, 1);
      save();
      render();
    }

    function toggleOpen(i) {
      goals[i].open = !goals[i].open;
      save();
      render();
    }

    function addStep(i) {
      const step = prompt('Шаг:');
      if (!step) return;

      goals[i].steps.push({
        text: step,
        done: false
      });

      save();
      render();
    }

    function toggleStep(i, j) {
      goals[i].steps[j].done = !goals[i].steps[j].done;
      save();
      render();
    }

    function setDate(i) {
      const date = prompt('Введите дедлайн (например 2026-05-01):');
      if (!date) return;

      goals[i].date = date;
      save();
      render();
    }

    function render() {
      const container = document.getElementById('goals');
      container.innerHTML = '';

      goals.forEach((goal, i) => {
        const done = goal.steps.filter(s => s.done).length;
        const percent = goal.steps.length
          ? Math.round(done / goal.steps.length * 100)
          : 0;

        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <div class="row">
            <div class="title">${goal.title}</div>
            <button class="ghost" onclick="toggleOpen(${i})">
              ${goal.open ? 'Скрыть' : 'Открыть'}
            </button>
          </div>

          <div class="${goal.open ? '' : 'hidden'}">
            <p>Дедлайн: ${goal.date || 'не задан'}</p>

            <div class="progress">
              <div class="bar" style="width:${percent}%"></div>
            </div>

            <p>${percent}%</p>

            <button class="primary" onclick="addStep(${i})">+ шаг</button>
            <button class="ghost" onclick="setDate(${i})">📅 дедлайн</button>
            <button class="danger" onclick="deleteGoal(${i})">Удалить</button>

            <ul>
              ${goal.steps.map((s, j) => `
                <li>
                  <input type="checkbox"
                    ${s.done ? 'checked' : ''}
                    onclick="toggleStep(${i}, ${j})">
                  ${s.text}
                </li>
              `).join('')}
            </ul>
          </div>
        `;

        container.appendChild(div);
      });
    }

    render();
  </script>

</body>
</html>
