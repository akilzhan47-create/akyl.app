<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REDMIND</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    body { margin:0; background:#fff; font-family:Arial; }

    .container { padding:16px; padding-bottom:80px; max-width:520px; margin:auto; }

    .logo { font-family:'Bebas Neue'; font-size:70px; text-align:center; color:#7f1d1d; }

    .card { background:#f9fafb; padding:12px; border-radius:14px; margin-bottom:10px; border:1px solid #eee; }

    .row { display:flex; justify-content:space-between; }

    button { padding:8px 12px; border:none; border-radius:10px; }
    .primary { background:#1e3a8a; color:#fff; }
    .danger { background:#000; color:#fff; }
    .ghost { background:#e5e7eb; }

    input, textarea { width:100%; padding:10px; margin:6px 0; border-radius:10px; border:1px solid #e5e7eb; }

    .hidden { display:none; }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">REDMIND</div>

  <!-- РЕФЛЕКСИЯ -->
  <div id="quoteScreen">
    <p>"Дисциплина — это мост между целями и результатами."</p>
    <textarea id="reflection" placeholder="Напиши мысли..."></textarea>
    <button class="primary" onclick="enterApp()">Войти</button>
  </div>

  <!-- ГЛАВНАЯ -->
  <div id="home" class="hidden">
    <input id="goalInput" placeholder="Название ивента">
    <input id="rewardInput" placeholder="Награда (что получишь)">
    <button class="primary" onclick="addGoal()">Добавить ивент</button>

    <div id="goals"></div>
  </div>

  <!-- АРХИВ -->
  <div id="archive" class="hidden">
    <h3>Архив</h3>
    <div id="archiveList"></div>
  </div>

</div>

<script>
let goals = JSON.parse(localStorage.getItem('goals')) || [];
let archive = JSON.parse(localStorage.getItem('archive')) || [];

function save(){
  localStorage.setItem('goals', JSON.stringify(goals));
  localStorage.setItem('archive', JSON.stringify(archive));
}

function enterApp(){
  const text = document.getElementById('reflection').value;
  if(text.length < 10){
    alert('Напиши мысли');
    return;
  }
  document.getElementById('quoteScreen').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

function addGoal(){
  const title = document.getElementById('goalInput').value;
  const reward = document.getElementById('rewardInput').value;

  if(!title) return;

  goals.push({
    title,
    reward,
    steps: [],
    open: false
  });

  document.getElementById('goalInput').value='';
  document.getElementById('rewardInput').value='';

  save();
  render();
}

function toggleOpen(i){
  goals[i].open = !goals[i].open;
  save();
  render();
}

function addStep(i){
  const step = prompt('Шаг:');
  if(!step) return;

  goals[i].steps.push({ text:step, done:false });
  save();
  render();
}

function toggleStep(i,j){
  goals[i].steps[j].done = !goals[i].steps[j].done;
  save();
  render();
}

function deleteGoal(i){
  const reason = prompt('Почему удаляешь цель?');
  if(!reason) return;

  archive.push({
    ...goals[i],
    reason,
    date: new Date().toLocaleDateString()
  });

  goals.splice(i,1);
  save();
  render();
  renderArchive();
}

function render(){
  const c = document.getElementById('goals');
  c.innerHTML='';

  goals.forEach((g,i)=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <div class="row">
        <b>${g.title}</b>
        <button class="ghost" onclick="toggleOpen(${i})">
          ${g.open ? 'Скрыть' : 'Открыть'}
        </button>
      </div>

      <div class="${g.open ? '' : 'hidden'}">
        <p><b>Награда:</b> ${g.reward || '—'}</p>

        <button class="primary" onclick="addStep(${i})">+ шаг</button>
        <button class="danger" onclick="deleteGoal(${i})">Удалить</button>

        <ul>
          ${g.steps.map((s,j)=>`
            <li>
              <input type="checkbox"
                ${s.done ? 'checked' : ''}
                onclick="toggleStep(${i},${j})">
              ${s.text}
            </li>
          `).join('')}
        </ul>
      </div>
    `;

    c.appendChild(div);
  });
}

function renderArchive(){
  const a = document.getElementById('archiveList');
  if(!a) return;

  a.innerHTML='';

  archive.forEach(g=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <b>${g.title}</b>
      <p>Причина: ${g.reason}</p>
      <p>Дата: ${g.date}</p>
    `;

    a.appendChild(div);
  });
}

render();
renderArchive();
</script>

</body>
</html>
